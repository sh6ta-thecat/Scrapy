<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Scraper Pro</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

    <div class="sidebar">
        <h2>Bloques</h2>

        <div class="block" data-type="url">FROM</div>
        <div class="block" data-type="select">SELECT</div>
        <div class="block" data-type="text">TEXT</div>
        <div class="block" data-type="attr">ATTR</div>
        <div class="block" data-type="base">BASE</div>
        <div class="block" data-type="output">OUTPUT</div>

        <button onclick="runFlow()">▶ Run</button>
        <button onclick="stepFlow()">🐢 Step</button>
        <button onclick="saveProject()">💾 Save</button>
        <button onclick="loadProject()">📂 Load</button>
    </div>

    <div id="canvas-container">
        <svg id="connections"></svg>
        <div id="canvas"></div>
    </div>

    <div class="panel">
        <h3>Preview</h3>
        <div id="preview"></div>

        <h3>Debug</h3>
        <div id="debug"></div>

        <h3>SQL</h3>
        <pre id="sql"></pre>

        <h3>JSON</h3>
        <pre id="json"></pre>
    </div>

</div>

<script src="engine.js"></script>
<script src="app.js"></script>
</body>
</html>
